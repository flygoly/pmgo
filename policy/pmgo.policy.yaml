tools:
  shell.exec:
    allow: false

  fs.write:
    allow_paths:
      - "./memory/**"
      - "./reports/**"

  github.close_pr:
    allow: true
    require_confirm: true

  github.issue.read:
    allow: true

  github.issue.create:
    allow: true
    require_confirm: true

  github.issue.update:
    allow: true
    require_confirm: true

  github.issue.import_task:
    allow: true
    require_confirm: true

  project_core.read:
    allow: true

  project_core.project.write:
    allow: true
    require_confirm: true

  project_core.task.write:
    allow: true
    require_confirm: true

  pmgo.report.daily:
    allow: true

  pmgo.report.weekly:
    allow: true

  pmgo.risk.scan:
    allow: true

  jira.transition_issue:
    allow: true
    require_confirm: true

quiet_hours:
  timezone: "Asia/Shanghai"
  ranges:
    - "22:00-08:00"
  weekends: mute_non_critical
