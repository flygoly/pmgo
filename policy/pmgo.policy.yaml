tools:
  shell.exec:
    allow: false

  fs.write:
    allow_paths:
      - "./memory/**"
      - "./reports/**"

  github.close_pr:
    allow: true
    require_confirm: true

  github.issue.read:
    allow: true

  github.issue.create:
    allow: true
    require_confirm: true

  github.issue.update:
    allow: true
    require_confirm: true

  github.issue.import_task:
    allow: true
    require_confirm: true

  linear.issue.read:
    allow: true

  linear.issue.import_task:
    allow: true
    require_confirm: true

  linear.issue.comment:
    allow: true
    require_confirm: true

  jira.issue.read:
    allow: true

  jira.issue.import_task:
    allow: true
    require_confirm: true

  project_core.read:
    allow: true

  project_core.project.write:
    allow: true
    require_confirm: true

  project_core.task.write:
    allow: true
    require_confirm: true

  project_core.milestone.read:
    allow: true

  project_core.milestone.write:
    allow: true
    require_confirm: true

  project_core.risk.read:
    allow: true

  project_core.risk.write:
    allow: true
    require_confirm: true

  project_core.decision.read:
    allow: true

  project_core.decision.write:
    allow: true
    require_confirm: true

  project_core.people.read:
    allow: true

  project_core.people.write:
    allow: true
    require_confirm: true

  project_core.retrospective.read:
    allow: true

  project_core.retrospective.write:
    allow: true
    require_confirm: true

  github.issue.sync:
    allow: true
    require_confirm: true

  pmgo.report.daily:
    allow: true

  pmgo.report.weekly:
    allow: true

  pmgo.risk.scan:
    allow: true

  jira.transition_issue:
    allow: true
    require_confirm: true

  feishu.task.read:
    allow: true

  feishu.task.import_task:
    allow: true
    require_confirm: true

  notion.page.read:
    allow: true

  notion.page.import_task:
    allow: true
    require_confirm: true

  pmgo.canvas.read:
    allow: true

quiet_hours:
  timezone: "Asia/Shanghai"
  ranges:
    - "22:00-08:00"
  weekends: mute_non_critical
