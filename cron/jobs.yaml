# Human-readable intent only — OpenClaw does NOT read this file.
# Production schedules: use Gateway cron (`openclaw cron add`); see `openclaw/README.md`.
# Repo scripts: `scripts/daily-standup.py`, `scripts/weekly-report.py`, `scripts/pmgo_mcp_server.py`.

- name: morning-briefing
  cron: "0 9 * * 1-5"
  agent: pmgo-reporter
  action: summarize_today_and_blockers

- name: blocker-scan
  heartbeat: 30m
  agent: pmgo-risker
  action: detect_blocked_tasks
  escalate_if: "blocked_hours > 24"

- name: weekly-report
  cron: "0 17 * * 5"
  agent: pmgo-reporter
  action: generate_weekly_report
