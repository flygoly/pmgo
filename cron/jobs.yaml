# Human-readable intent only — gateways do NOT read this file.
# OpenClaw: openclaw cron add — see runtimes/openclaw/README.md
# Hermes:   hermes cron create — see runtimes/hermes/README.md
# Shared agent messages: shared/cron-messages.md
# Repo scripts: `scripts/daily-standup.py`, `scripts/weekly-report.py`, `scripts/pmgo_mcp_server.py`.

- name: morning-briefing
  cron: "0 9 * * 1-5"
  agent: pmgo-reporter
  action: summarize_today_and_blockers

- name: blocker-scan
  heartbeat: 30m
  agent: pmgo-risker
  action: detect_blocked_tasks
  escalate_if: "blocked_hours > 24"

- name: weekly-report
  cron: "0 17 * * 5"
  agent: pmgo-reporter
  action: generate_weekly_report
